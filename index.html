<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陈情 · 引导页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #ffffff;
            text-align: center;
            padding: 80px 20px;
            min-height: 100vh;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-color: #1e293b;
            margin: 0 auto 24px;
            overflow: hidden;
            border: 3px solid #334155;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #f8fafc;
        }
        p {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 16px;
        }
        .btn {
            display: block;
            width: 280px;
            line-height: 52px;
            background-color: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            margin: 0 auto 16px;
            font-size: 16px;
            transition: background-color 0.3s ease;
        }
        .btn:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="avatar">
        <img src="https://imgs.freeimg.cn/2026/04/28/1735933148424494.png" alt="头像">
    </div>
    <h1>陈情</h1>
    <p>欢迎点击下方入口</p>
    <a class="btn" href="https://wqfk.cn/shop/CQ888">进入商城</a>
</body>
</html>
